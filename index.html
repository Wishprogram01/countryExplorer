<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEO//INTEL — Country Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#020c06;
  --bg2:#040f08;
  --surface:#071a0d;
  --surface2:#0a2213;
  --border:#0d3d1a;
  --border2:#1a6632;
  --glow:#00ff6a;
  --glow2:#00cc55;
  --glow-dim:#005522;
  --glow-rgb:0,255,106;
  --amber:#ffaa00;
  --amber-dim:#4a3000;
  --red:#ff3344;
  --text:#c8ffd8;
  --text2:#5aaf75;
  --text3:#2a6640;
  --mono:'Share Tech Mono',monospace;
  --display:'Orbitron',monospace;
  --body:'Rajdhani',sans-serif;
  --scan-speed:8s;
}

html{scroll-behavior:smooth}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--body);
  min-height:100vh;
  overflow-x:hidden;
  cursor:crosshair;
}

/* scanline overlay */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
  pointer-events:none;
  z-index:9999;
}

/* animated scan beam */
body::after{
  content:'';
  position:fixed;
  left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,transparent,rgba(var(--glow-rgb),0.4),transparent);
  animation:scanBeam var(--scan-speed) linear infinite;
  pointer-events:none;
  z-index:9998;
}
@keyframes scanBeam{
  0%{top:-4px;opacity:0}
  5%{opacity:1}
  95%{opacity:1}
  100%{top:100vh;opacity:0}
}

/* ── HEADER ── */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 clamp(1rem,3vw,2.5rem);
  height:60px;
  border-bottom:1px solid var(--border);
  background:var(--bg2);
  position:sticky;
  top:0;
  z-index:100;
}

.logo{
  font-family:var(--display);
  font-size:clamp(0.75rem,2vw,1rem);
  font-weight:900;
  letter-spacing:0.15em;
  color:var(--glow);
  text-shadow:0 0 20px rgba(var(--glow-rgb),0.6);
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-sep{color:var(--text3);font-weight:400}

.header-status{
  display:flex;
  align-items:center;
  gap:1.5rem;
}

.status-dot{
  display:flex;
  align-items:center;
  gap:6px;
  font-family:var(--mono);
  font-size:0.65rem;
  color:var(--text3);
  letter-spacing:0.1em;
}

.dot{
  width:6px;height:6px;
  border-radius:50%;
  background:var(--glow);
  box-shadow:0 0 8px var(--glow);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

.live-clock{
  font-family:var(--mono);
  font-size:0.7rem;
  color:var(--text2);
  letter-spacing:0.1em;
}

/* ── MAIN LAYOUT ── */
.app{
  display:grid;
  grid-template-columns:320px 1fr;
  grid-template-rows:auto 1fr;
  min-height:calc(100vh - 60px);
}

/* ── SIDEBAR ── */
.sidebar{
  grid-row:1/3;
  border-right:1px solid var(--border);
  background:var(--bg2);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.sidebar-header{
  padding:1.25rem 1.25rem 1rem;
  border-bottom:1px solid var(--border);
}

.sidebar-title{
  font-family:var(--mono);
  font-size:0.65rem;
  color:var(--text3);
  letter-spacing:0.2em;
  text-transform:uppercase;
  margin-bottom:0.75rem;
}

.search-wrap{
  position:relative;
  display:flex;
  align-items:center;
}

.search-prefix{
  font-family:var(--mono);
  font-size:0.8rem;
  color:var(--glow);
  position:absolute;
  left:10px;
  pointer-events:none;
  z-index:1;
}

.search-input{
  width:100%;
  background:var(--surface);
  border:1px solid var(--border2);
  color:var(--text);
  font-family:var(--mono);
  font-size:0.8rem;
  padding:9px 10px 9px 30px;
  outline:none;
  border-radius:3px;
  letter-spacing:0.05em;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{
  border-color:var(--glow);
  box-shadow:0 0 12px rgba(var(--glow-rgb),0.2);
}

.filter-row{
  display:flex;
  gap:6px;
  margin-top:8px;
  flex-wrap:wrap;
}

.filter-btn{
  background:transparent;
  border:1px solid var(--border);
  color:var(--text3);
  font-family:var(--mono);
  font-size:0.6rem;
  letter-spacing:0.1em;
  text-transform:uppercase;
  padding:4px 10px;
  border-radius:2px;
  cursor:pointer;
  transition:all 0.15s;
}
.filter-btn:hover,.filter-btn.active{
  border-color:var(--glow);
  color:var(--glow);
  background:rgba(var(--glow-rgb),0.05);
}

.country-list{
  flex:1;
  overflow-y:auto;
  padding:0.5rem 0;
}
.country-list::-webkit-scrollbar{width:3px}
.country-list::-webkit-scrollbar-track{background:transparent}
.country-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.country-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:9px 1.25rem;
  cursor:pointer;
  border-left:2px solid transparent;
  transition:all 0.15s;
  position:relative;
}
.country-item::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,rgba(var(--glow-rgb),0.04),transparent);
  opacity:0;
  transition:opacity 0.15s;
}
.country-item:hover{
  border-left-color:var(--glow2);
  background:var(--surface);
}
.country-item:hover::after{opacity:1}
.country-item.selected{
  border-left-color:var(--glow);
  background:var(--surface2);
}

.country-flag{font-size:1.2rem;line-height:1;flex-shrink:0}

.country-item-info{flex:1;min-width:0}
.country-item-name{
  font-family:var(--body);
  font-size:0.85rem;
  font-weight:600;
  color:var(--text);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  letter-spacing:0.02em;
}
.country-item-sub{
  font-family:var(--mono);
  font-size:0.6rem;
  color:var(--text3);
  letter-spacing:0.08em;
}

.country-item-pop{
  font-family:var(--mono);
  font-size:0.6rem;
  color:var(--text3);
  text-align:right;
  flex-shrink:0;
}

.list-count{
  padding:0.5rem 1.25rem;
  font-family:var(--mono);
  font-size:0.6rem;
  color:var(--text3);
  letter-spacing:0.1em;
  border-top:1px solid var(--border);
}

/* ── MAIN CONTENT ── */
.main{
  background:var(--bg);
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}

/* ── IDLE STATE ── */
.idle-screen{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:3rem;
  text-align:center;
}

.idle-grid{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:4px;
  margin-bottom:3rem;
  opacity:0.15;
}
.idle-cell{
  width:18px;height:18px;
  border:1px solid var(--glow);
  animation:cellBlink 3s ease-in-out infinite;
}
.idle-cell:nth-child(odd){animation-delay:calc(var(--i,0)*0.1s)}

@keyframes cellBlink{0%,100%{opacity:0.3}50%{opacity:1}}

.idle-title{
  font-family:var(--display);
  font-size:clamp(1.5rem,4vw,2.5rem);
  font-weight:900;
  color:var(--glow);
  text-shadow:0 0 30px rgba(var(--glow-rgb),0.4);
  letter-spacing:0.1em;
  margin-bottom:0.75rem;
  animation:glitch 4s infinite;
}

@keyframes glitch{
  0%,90%,100%{text-shadow:0 0 30px rgba(var(--glow-rgb),0.4)}
  92%{text-shadow:-2px 0 var(--red),2px 0 var(--glow),0 0 30px rgba(var(--glow-rgb),0.4)}
  94%{text-shadow:2px 0 var(--amber),-2px 0 var(--glow),0 0 30px rgba(var(--glow-rgb),0.4)}
  96%{text-shadow:0 0 30px rgba(var(--glow-rgb),0.4)}
}

.idle-sub{
  font-family:var(--mono);
  font-size:0.78rem;
  color:var(--text3);
  letter-spacing:0.15em;
  line-height:2;
}

.idle-stats{
  display:flex;
  gap:3rem;
  margin-top:2.5rem;
}

.idle-stat{
  text-align:center;
}
.idle-stat-num{
  font-family:var(--display);
  font-size:1.6rem;
  font-weight:700;
  color:var(--glow);
  display:block;
}
.idle-stat-label{
  font-family:var(--mono);
  font-size:0.6rem;
  color:var(--text3);
  letter-spacing:0.15em;
  text-transform:uppercase;
}

/* ── DETAIL PANEL ── */
.detail{
  flex:1;
  display:none;
  padding:clamp(1.5rem,3vw,2.5rem);
  animation:panelIn 0.35s cubic-bezier(0.4,0,0.2,1);
}
.detail.visible{display:block}

@keyframes panelIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* detail header */
.detail-header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:1.5rem;
  margin-bottom:2rem;
  padding-bottom:1.5rem;
  border-bottom:1px solid var(--border);
}

.detail-flag{
  font-size:5rem;
  line-height:1;
  filter:drop-shadow(0 0 20px rgba(var(--glow-rgb),0.3));
}

.detail-title-group{flex:1}

.detail-code{
  font-family:var(--mono);
  font-size:0.65rem;
  color:var(--glow);
  letter-spacing:0.25em;
  text-transform:uppercase;
  margin-bottom:0.4rem;
  display:flex;
  align-items:center;
  gap:8px;
}
.detail-code::before{
  content:'';
  width:20px;height:1px;
  background:var(--glow);
}

.detail-name{
  font-family:var(--display);
  font-size:clamp(1.4rem,3vw,2rem);
  font-weight:900;
  color:var(--text);
  letter-spacing:0.05em;
  line-height:1.1;
  margin-bottom:0.3rem;
}

.detail-native{
  font-family:var(--body);
  font-size:0.9rem;
  color:var(--text3);
  font-weight:300;
  letter-spacing:0.05em;
}

.detail-badges{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:0.75rem;
}

.badge{
  font-family:var(--mono);
  font-size:0.6rem;
  letter-spacing:0.1em;
  text-transform:uppercase;
  padding:4px 10px;
  border-radius:2px;
  border:1px solid;
}
.badge-green{border-color:var(--glow-dim);color:var(--glow2);background:rgba(var(--glow-rgb),0.05)}
.badge-amber{border-color:var(--amber-dim);color:var(--amber);background:rgba(255,170,0,0.05)}
.badge-red{border-color:#3d0010;color:var(--red);background:rgba(255,51,68,0.05)}

/* data grid */
.data-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:1px;
  background:var(--border);
  border:1px solid var(--border);
  margin-bottom:1.5rem;
  border-radius:4px;
  overflow:hidden;
}

.data-cell{
  background:var(--surface);
  padding:1rem 1.1rem;
  transition:background 0.15s;
}
.data-cell:hover{background:var(--surface2)}

.data-label{
  font-family:var(--mono);
  font-size:0.58rem;
  color:var(--text3);
  letter-spacing:0.2em;
  text-transform:uppercase;
  margin-bottom:0.4rem;
}

.data-value{
  font-family:var(--body);
  font-size:0.95rem;
  font-weight:600;
  color:var(--text);
  letter-spacing:0.02em;
  line-height:1.3;
}

.data-value.mono{
  font-family:var(--mono);
  font-size:0.85rem;
  color:var(--glow2);
}

/* section headers */
.section-head{
  font-family:var(--mono);
  font-size:0.62rem;
  color:var(--text3);
  letter-spacing:0.2em;
  text-transform:uppercase;
  margin-bottom:1rem;
  display:flex;
  align-items:center;
  gap:10px;
}
.section-head::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}

/* borders list */
.borders-list{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:2rem;
}

.border-tag{
  background:var(--surface);
  border:1px solid var(--border2);
  color:var(--text2);
  font-family:var(--mono);
  font-size:0.7rem;
  letter-spacing:0.1em;
  padding:6px 14px;
  border-radius:2px;
  cursor:pointer;
  transition:all 0.15s;
  text-transform:uppercase;
}
.border-tag:hover{
  border-color:var(--glow);
  color:var(--glow);
  background:rgba(var(--glow-rgb),0.06);
  transform:translateY(-1px);
}

/* map frame */
.map-wrap{
  border:1px solid var(--border);
  border-radius:4px;
  overflow:hidden;
  position:relative;
  margin-bottom:2rem;
}
.map-label{
  position:absolute;
  top:10px;left:10px;
  background:rgba(2,12,6,0.9);
  border:1px solid var(--border2);
  font-family:var(--mono);
  font-size:0.6rem;
  color:var(--glow2);
  letter-spacing:0.1em;
  padding:4px 10px;
  z-index:1;
}
.map-wrap iframe{
  width:100%;
  height:300px;
  border:none;
  display:block;
  filter:invert(1) hue-rotate(120deg) saturate(0.7);
  opacity:0.85;
}

/* languages/currencies section */
.tag-grid{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:2rem;
}
.data-tag{
  background:var(--surface);
  border:1px solid var(--border);
  font-family:var(--body);
  font-size:0.82rem;
  font-weight:600;
  color:var(--text2);
  padding:5px 14px;
  border-radius:2px;
  letter-spacing:0.05em;
}

/* loading state */
.loading-state{
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:4rem;
  gap:1.5rem;
  flex:1;
}
.loading-state.visible{display:flex}

.loading-bar{
  width:200px;
  height:2px;
  background:var(--border);
  border-radius:1px;
  overflow:hidden;
}
.loading-bar::after{
  content:'';
  display:block;
  height:100%;
  width:40%;
  background:var(--glow);
  box-shadow:0 0 10px var(--glow);
  animation:loadScan 1s ease-in-out infinite;
}
@keyframes loadScan{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(350%)}
}
.loading-text{
  font-family:var(--mono);
  font-size:0.7rem;
  color:var(--text3);
  letter-spacing:0.2em;
  animation:blink 1s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .app{grid-template-columns:1fr;grid-template-rows:auto auto 1fr}
  .sidebar{grid-row:auto;max-height:45vh;border-right:none;border-bottom:1px solid var(--border)}
  .idle-stats{gap:1.5rem}
  .idle-grid{display:none}
  .detail-flag{font-size:3.5rem}
}

/* scrollbar */
.main::-webkit-scrollbar{width:3px}
.main::-webkit-scrollbar-track{background:transparent}
.main::-webkit-scrollbar-thumb{background:var(--border2)}
</style>
</head>
<body>

<header>
  <div class="logo">
    GEO<span class="logo-sep">//</span>INTEL
    <span style="font-family:var(--mono);font-size:0.6rem;color:var(--text3);font-weight:400;letter-spacing:0.1em">v2.4.1</span>
  </div>
  <div class="header-status">
    <div class="status-dot"><span class="dot"></span>LIVE FEED</div>
    <div class="live-clock" id="clock">--:--:--</div>
  </div>
</header>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">// NATION DATABASE</div>
      <div class="search-wrap">
        <span class="search-prefix">›</span>
        <input class="search-input" id="searchInput" type="text" placeholder="QUERY NATION..." autocomplete="off" spellcheck="false">
      </div>
      <div class="filter-row" id="filterRow">
        <button class="filter-btn active" data-region="all">ALL</button>
        <button class="filter-btn" data-region="Asia">ASIA</button>
        <button class="filter-btn" data-region="Europe">EUR</button>
        <button class="filter-btn" data-region="Americas">AMER</button>
        <button class="filter-btn" data-region="Africa">AFR</button>
        <button class="filter-btn" data-region="Oceania">OCE</button>
      </div>
    </div>
    <div class="country-list" id="countryList"></div>
    <div class="list-count" id="listCount">LOADING DATABASE...</div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainPanel">

    <!-- IDLE -->
    <div class="idle-screen" id="idleScreen">
      <div class="idle-grid" id="idleGrid"></div>
      <div class="idle-title">SELECT TARGET</div>
      <div class="idle-sub">
        GLOBAL INTELLIGENCE NETWORK ACTIVE<br>
        195 SOVEREIGN NATIONS INDEXED<br>
        SELECT A NATION TO BEGIN ANALYSIS
      </div>
      <div class="idle-stats">
        <div class="idle-stat">
          <span class="idle-stat-num" id="statNations">—</span>
          <span class="idle-stat-label">Nations</span>
        </div>
        <div class="idle-stat">
          <span class="idle-stat-num" id="statPop">—</span>
          <span class="idle-stat-label">World Pop.</span>
        </div>
        <div class="idle-stat">
          <span class="idle-stat-num" id="statRegions">8</span>
          <span class="idle-stat-label">Regions</span>
        </div>
      </div>
    </div>

    <!-- LOADING -->
    <div class="loading-state" id="loadingState">
      <div class="loading-bar"></div>
      <div class="loading-text">RETRIEVING INTEL...</div>
    </div>

    <!-- DETAIL -->
    <div class="detail" id="detailPanel"></div>

  </main>
</div>

<script>
let allCountries = [];
let activeRegion = 'all';
let selectedCode = null;

// Clock
function updateClock(){
  const n = new Date();
  document.getElementById('clock').textContent =
    n.toUTCString().split(' ')[4] + ' UTC';
}
setInterval(updateClock, 1000);
updateClock();

// Idle grid decoration
const grid = document.getElementById('idleGrid');
for(let i=0;i<64;i++){
  const c=document.createElement('div');
  c.className='idle-cell';
  c.style.setProperty('--i',i);
  c.style.animationDelay=(Math.random()*3)+'s';
  grid.appendChild(c);
}

// Format numbers
function fmt(n){
  if(!n) return 'N/A';
  if(n>=1e9) return (n/1e9).toFixed(2)+'B';
  if(n>=1e6) return (n/1e6).toFixed(1)+'M';
  if(n>=1e3) return (n/1e3).toFixed(0)+'K';
  return n.toString();
}

function fmtArea(n){
  if(!n) return 'N/A';
  return n.toLocaleString() + ' km²';
}

// Fetch all countries
fetch('https://restcountries.com/v3.1/all?fields=name,cca2,cca3,flags,region,subregion,capital,population,area,languages,currencies,borders,timezones,continents,independent,unMember,latlng,tld,callingCodes,idd')
  .then(r=>r.json())
  .then(data=>{
    allCountries = data.sort((a,b)=>a.name.common.localeCompare(b.name.common));
    renderList(allCountries);

    const totalPop = allCountries.reduce((s,c)=>s+(c.population||0),0);
    document.getElementById('statNations').textContent = allCountries.length;
    document.getElementById('statPop').textContent = fmt(totalPop);
  })
  .catch(()=>{
    document.getElementById('listCount').textContent = 'CONNECTION FAILED';
  });

function renderList(countries){
  const list = document.getElementById('countryList');
  list.innerHTML='';
  countries.forEach(c=>{
    const div=document.createElement('div');
    div.className='country-item'+(selectedCode===c.cca2?' selected':'');
    div.dataset.code=c.cca2;
    div.innerHTML=`
      <span class="country-flag">${c.flags?.emoji||'🏳'}</span>
      <div class="country-item-info">
        <div class="country-item-name">${c.name.common}</div>
        <div class="country-item-sub">${c.region||''} · ${c.cca3}</div>
      </div>
      <div class="country-item-pop">${fmt(c.population)}</div>`;
    div.addEventListener('click',()=>selectCountry(c));
    list.appendChild(div);
  });
  document.getElementById('listCount').textContent =
    `// ${countries.length} NATIONS INDEXED`;
}

function selectCountry(country){
  selectedCode = country.cca2;
  document.querySelectorAll('.country-item').forEach(el=>{
    el.classList.toggle('selected', el.dataset.code===country.cca2);
  });
  showDetail(country);
}

function showDetail(c){
  document.getElementById('idleScreen').style.display='none';
  document.getElementById('loadingState').classList.remove('visible');
  const panel = document.getElementById('detailPanel');
  panel.innerHTML='';
  panel.classList.remove('visible');

  // show loading briefly for realism
  document.getElementById('loadingState').classList.add('visible');
  setTimeout(()=>{
    document.getElementById('loadingState').classList.remove('visible');
    panel.innerHTML = buildDetail(c);
    panel.classList.add('visible');
  }, 400);
}

function buildDetail(c){
  const name = c.name?.common || 'Unknown';
  const official = c.name?.official || name;
  const native = c.name?.nativeName ? Object.values(c.name.nativeName)[0]?.official || '' : '';
  const capital = c.capital?.[0] || 'N/A';
  const region = c.region || 'N/A';
  const sub = c.subregion || '';
  const pop = c.population ? c.population.toLocaleString() : 'N/A';
  const area = fmtArea(c.area);
  const tld = c.tld?.[0] || 'N/A';
  const tz = c.timezones?.[0] || 'N/A';
  const lat = c.latlng?.[0]?.toFixed(2) || '?';
  const lng = c.latlng?.[1]?.toFixed(2) || '?';

  const langs = c.languages ? Object.values(c.languages) : [];
  const currencies = c.currencies ? Object.entries(c.currencies).map(([k,v])=>`${v.name} (${v.symbol||k})`) : [];
  const borders = c.borders || [];
  const calling = c.idd?.root ? (c.idd.root + (c.idd.suffixes?.[0]||'')) : 'N/A';

  // density
  const density = c.population && c.area ? (c.population/c.area).toFixed(1)+' /km²' : 'N/A';

  // status badges
  let badges = '';
  if(c.independent) badges += `<span class="badge badge-green">INDEPENDENT</span>`;
  if(c.unMember) badges += `<span class="badge badge-amber">UN MEMBER</span>`;
  if(!c.independent) badges += `<span class="badge badge-red">TERRITORY</span>`;

  // borders html
  const bordersHtml = borders.length
    ? borders.map(b=>`<span class="border-tag" onclick="loadByCode('${b}')">${b}</span>`).join('')
    : '<span style="font-family:var(--mono);font-size:0.7rem;color:var(--text3)">NO LAND BORDERS — ISLAND NATION</span>';

  // map
  const mapSrc = `https://www.openstreetmap.org/export/embed.html?bbox=${parseFloat(lng)-5},${parseFloat(lat)-5},${parseFloat(lng)+5},${parseFloat(lat)+5}&layer=mapnik&marker=${lat},${lng}`;

  return `
    <div class="detail-header">
      <div>
        <div class="detail-flag">${c.flags?.emoji||'🏳'}</div>
      </div>
      <div class="detail-title-group">
        <div class="detail-code">${c.cca3} · ${c.cca2}</div>
        <div class="detail-name">${name}</div>
        <div class="detail-native">${official !== name ? official : (native||'')}</div>
        <div class="detail-badges">${badges}</div>
      </div>
    </div>

    <div class="section-head">// GEOGRAPHIC DATA</div>
    <div class="data-grid">
      <div class="data-cell">
        <div class="data-label">Capital</div>
        <div class="data-value">${capital}</div>
      </div>
      <div class="data-cell">
        <div class="data-label">Region</div>
        <div class="data-value">${region}${sub?'<br><span style="font-size:0.75rem;color:var(--text3)">'+sub+'</span>':''}</div>
      </div>
      <div class="data-cell">
        <div class="data-label">Coordinates</div>
        <div class="data-value mono">${lat}° / ${lng}°</div>
      </div>
      <div class="data-cell">
        <div class="data-label">Area</div>
        <div class="data-value mono">${area}</div>
      </div>
      <div class="data-cell">
        <div class="data-label">Population</div>
        <div class="data-value mono">${pop}</div>
      </div>
      <div class="data-cell">
        <div class="data-label">Pop. Density</div>
        <div class="data-value mono">${density}</div>
      </div>
      <div class="data-cell">
        <div class="data-label">Timezone</div>
        <div class="data-value mono">${tz}</div>
      </div>
      <div class="data-cell">
        <div class="data-label">Calling Code</div>
        <div class="data-value mono">${calling}</div>
      </div>
      <div class="data-cell">
        <div class="data-label">Top Domain</div>
        <div class="data-value mono">${tld}</div>
      </div>
    </div>

    <div class="section-head">// LANGUAGES</div>
    <div class="tag-grid">${langs.map(l=>`<span class="data-tag">${l}</span>`).join('') || '<span class="data-tag">N/A</span>'}</div>

    <div class="section-head">// CURRENCIES</div>
    <div class="tag-grid">${currencies.map(cu=>`<span class="data-tag">${cu}</span>`).join('') || '<span class="data-tag">N/A</span>'}</div>

    <div class="section-head">// BORDERING NATIONS</div>
    <div class="borders-list">${bordersHtml}</div>

    <div class="section-head">// SATELLITE VIEW</div>
    <div class="map-wrap">
      <div class="map-label">SECTOR: ${lat}°N ${lng}°E</div>
      <iframe src="${mapSrc}" loading="lazy" title="Map of ${name}"></iframe>
    </div>
  `;
}

function loadByCode(code){
  const country = allCountries.find(c=>c.cca3===code || c.cca2===code);
  if(country){
    selectCountry(country);
    // scroll the list item into view
    const el = document.querySelector(`[data-code="${country.cca2}"]`);
    if(el) el.scrollIntoView({block:'nearest',behavior:'smooth'});
  }
}

// Search
document.getElementById('searchInput').addEventListener('input',e=>{
  filterList();
});

// Region filter
document.getElementById('filterRow').addEventListener('click',e=>{
  const btn = e.target.closest('.filter-btn');
  if(!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeRegion = btn.dataset.region;
  filterList();
});

function filterList(){
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = allCountries;
  if(activeRegion !== 'all') filtered = filtered.filter(c=>c.region===activeRegion);
  if(q) filtered = filtered.filter(c=>
    c.name.common.toLowerCase().includes(q) ||
    c.cca3.toLowerCase().includes(q) ||
    (c.capital?.[0]||'').toLowerCase().includes(q)
  );
  renderList(filtered);
}
</script>
</body>
</html>
